services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
       - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=minsu_clearance
      - ZEROBOUNCE_API_KEY=your_key_here
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
       - "3000:3000"
    environment:
       - BACKEND_URL=http://backend:8000
    depends_on {
       - backend
    }

volumes:
  mongodata: